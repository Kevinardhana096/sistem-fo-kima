server:
  name: sistem-fo-kima
  version: "1.0.0"
  trust_proxy: false

sources:
  - name: app-code
    type: code
    path: .
    file_patterns:
      - "frontend/src/**/*.{js,jsx,ts,tsx}"
      - "scripts/**/*.{js,cjs,mjs}"
      - "*.js"
    exclude_patterns:
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/.git/**"
    chunk:
      target_lines: 120
      overlap_lines: 20
  - name: project-docs
    type: markdown
    path: .
    file_patterns:
      - "README.md"
      - "DEV_GUIDE.md"
      - "docs/**/*.md"
      - "prd/**/*.md"
    exclude_patterns:
      - "**/node_modules/**"
    chunk:
      target_tokens: 600
      overlap_tokens: 50

tools:
  - name: explore-code
    type: bash
    description: "Explore source files with safe filesystem commands."
    sources: [app-code]
    bash:
      session_state: true
      grep_strategy: memory
      virtual_files: true
  - name: explore-docs
    type: bash
    description: "Explore documentation files with safe filesystem commands."
    sources: [project-docs]
    bash:
      session_state: true
      grep_strategy: memory
      virtual_files: true

indexing:
  auto_reindex: true
  reindex_hour_utc: 3
  stale_threshold_hours: 24
