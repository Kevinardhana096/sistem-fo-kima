services:
  valhalla-upstream:
    image: valhalla/valhalla:run-latest
    container_name: sistem-fo-kima-valhalla-upstream
    entrypoint:
      - /bin/bash
      - /custom_files/entrypoint.sh
    environment:
      VALHALLA_PBF_FILE: /imports/sulawesi.osm.pbf
    expose:
      - "8002"
    volumes:
      - ./infra/valhalla/runtime:/data
      - /home/asus_vivobook/projects/arsip-kima/infra/valhalla/data/sulawesi.osm.pbf:/imports/sulawesi.osm.pbf:ro
      - ./infra/valhalla/entrypoint.sh:/custom_files/entrypoint.sh:ro
    restart: unless-stopped

  valhalla-proxy:
    image: node:22-alpine
    container_name: sistem-fo-kima-valhalla-proxy
    working_dir: /app
    environment:
      VALHALLA_UPSTREAM_HOST: valhalla-upstream
      VALHALLA_UPSTREAM_PORT: 8002
    ports:
      - "8002:8002"
    volumes:
      - ./infra/valhalla/cors-proxy.js:/app/cors-proxy.js:ro
    depends_on:
      - valhalla-upstream
    command: node /app/cors-proxy.js
    restart: unless-stopped
